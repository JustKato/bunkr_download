name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-amd64
            runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            artifact: bunkrdownload-linux-amd64
            ext: ""
          - id: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            artifact: bunkrdownload-windows-amd64
            ext: .exe
          - id: macos-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            artifact: bunkrdownload-macos-amd64
            ext: ""
            dmg: true

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install Wails CLI for Windows resources
        if: runner.os == 'Windows'
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.117
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev \
            libwayland-dev
          ARCH="$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || gcc -print-multiarch)"
          PKG_CONFIG_PATH="/usr/lib/${ARCH}/pkgconfig:/usr/share/pkgconfig:/usr/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          export PKG_CONFIG_PATH
          pkg-config --modversion gtk4
          pkg-config --modversion webkitgtk-6.0

      - name: Build binary
        shell: bash
        run: |
          chmod +x scripts/*.sh
          ./scripts/release-build.sh "${{ matrix.goos }}" "${{ matrix.goarch }}" "dist/${{ matrix.artifact }}${{ matrix.ext }}"

      - name: Package Linux release with launcher icon
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ./scripts/package-linux-release.sh \
            "dist/${{ matrix.artifact }}" \
            "dist/${{ matrix.artifact }}.tar.gz"

      - name: Create macOS DMG
        if: matrix.dmg
        shell: bash
        run: |
          ./scripts/package-macos-dmg.sh \
            "dist/${{ matrix.artifact }}" \
            "dist/${{ matrix.artifact }}.dmg" \
            "${{ github.ref_name }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/bunkrdownload-linux-amd64
            dist/bunkrdownload-linux-amd64.tar.gz
            dist/bunkrdownload-windows-amd64.exe
            dist/bunkrdownload-macos-amd64.dmg
